<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#b78b4a">
  <title>Chessformer</title>
  <link rel="icon" href="profile-icon-v1.png" type="image/png">
  <link rel="apple-touch-icon" href="profile-icon-v1.png">
  <link rel="stylesheet" href="styles.css?v=3.0.0">
  <script async src="https://usions.com/usion-sdk.js"></script>
</head>
<body>
  <main class="game-shell">
    <div id="boardWrap" class="board-wrap">
      <canvas id="board" aria-label="Gravity chess puzzle board"></canvas>
      <header class="top-rail">
        <section class="hud" aria-live="polite">
          <button id="levelsButton" type="button"><span id="levelNumber">1 / 24</span><b id="levelTitle">Open File</b></button>
          <div class="move-pill"><span data-i18n="moves">Moves</span><strong id="moveCount">0</strong></div>
        </section>
        <p id="levelHint" class="hint">Rooks travel in straight lines.</p>
      </header>
      <nav class="control-rail" aria-label="Puzzle controls">
        <button id="undoButton" class="round-control" type="button" aria-label="Choose level">&#9664;</button>
        <button id="resetButton" class="round-control" type="button" aria-label="Reset">&#8635;</button>
      </nav>
    </div>
  </main>

  <div id="winOverlay" class="modal" hidden>
    <div class="modal-card"><p class="eyebrow" data-i18n="solved">SOLVED</p><h2 id="winTitle">Beautiful.</h2><p id="winDetail"></p><button id="nextButton" class="primary" type="button">Next puzzle</button></div>
  </div>
  <div id="levelOverlay" class="modal" hidden>
    <div class="modal-card level-modal">
      <div class="modal-head"><div><p class="eyebrow" data-i18n="campaign">CAMPAIGN</p><h2 data-i18n="choose">Choose a puzzle</h2></div><button id="closeLevels" class="close-button" type="button" aria-label="Close">×</button></div>
      <div id="levelGrid" class="level-grid"></div>
    </div>
  </div>
  <div id="promotionOverlay" class="modal promotion-modal" hidden>
    <div class="modal-card">
      <p class="eyebrow">PROMOTION</p>
      <h2>Choose a piece</h2>
      <div id="promotionChoices" class="promotion-choices" aria-label="Pawn promotion choices">
        <button type="button" data-promotion="rook" aria-label="Rook">&#9820;</button>
        <button type="button" data-promotion="bishop" aria-label="Bishop">&#9821;</button>
        <button type="button" data-promotion="knight" aria-label="Knight">&#9822;</button>
        <button type="button" data-promotion="queen" aria-label="Queen">&#9819;</button>
      </div>
    </div>
  </div>

  <script src="game-core.js?v=3.0.0"></script>
  <script src="levels.js?v=3.0.0"></script>
  <script src="layout.js?v=3.0.0"></script>
  <script src="app.js?v=3.0.0"></script>
</body>
</html>
