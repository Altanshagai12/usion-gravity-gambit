  <rect width="800" height="450" rx="42" fill="#f4f1ea"/>
  <g opacity=".55" fill="#dedbd2">
    <path d="M0 0h100v100H0zm200 0h100v100H200zm200 0h100v100H400zm200 0h100v100H600zM100 100h100v100H100zm200 0h100v100H300zm200 0h100v100H500zm200 0h100v100H700zM0 200h100v100H0zm200 0h100v100H200zm200 0h100v100H400zm200 0h100v100H600zM100 300h100v100H100zm200 0h100v100H300zm200 0h100v100H500zm200 0h100v100H700z"/>
  </g>
  <rect x="340" y="42" width="120" height="120" rx="32" fill="#4263eb"/><text x="400" y="112" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="88" fill="#fff">♞</text>
  <path d="M400 175v92" stroke="#4263eb" stroke-width="12" stroke-linecap="round" stroke-dasharray="8 18"/>
