  <text x="55" y="337" font-family="Arial,sans-serif" font-size="55" font-weight="800" letter-spacing="-3" fill="#171814">GRAVITY</text><text x="55" y="390" font-family="Arial,sans-serif" font-size="55" font-weight="800" letter-spacing="-3" fill="#4263eb">GAMBIT</text>
</svg>
